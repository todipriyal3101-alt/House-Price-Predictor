<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>House Price Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 400px;
        }
        h1 { text-align: center; color: #333; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        select, input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #45a049; }
        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏠 House Price Predictor</h1>
    <form action="/predict" method="POST">

        <label>Location:</label>
        <select name="location">
            {% for location in locations %}
                <option value="{{ location }}">{{ location }}</option>
            {% endfor %}
        </select>

        <label>Total Sqft:</label>
        <input type="number" name="total_sqft" placeholder="e.g. 1200" required>

        <label>BHK:</label>
        <input type="number" name="bhk" placeholder="e.g. 2" required>

        <label>Bathrooms:</label>
        <input type="number" name="bath" placeholder="e.g. 2" required>

        <button type="submit">Predict Price</button>
    </form>

    {% if prediction %}
    <div class="result">
        Estimated Price: ₹ {{ prediction }} Lakhs
    </div>
    {% endif %}
</div>
</body>
</html>
